<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volver más tarde</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Karla:ital,wght@0,400;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#e8e6e2; font-family:'Karla',sans-serif; display:flex; justify-content:center; padding:30px 0; }
  .phone { width:390px; background:#fffefb; min-height:800px; border-radius:24px; overflow:hidden; box-shadow:0 10px 40px rgba(0,0,0,.15); color:#33302c; }

  .top { padding:26px 22px 8px; text-align:center; }
  .polaroid { width:150px; margin:0 auto; background:#fff; padding:10px 10px 26px; box-shadow:0 4px 14px rgba(0,0,0,.18); transform:rotate(-3deg); position:relative; }
  .polaroid .ph { height:120px; background:#d9c7a7; display:flex; align-items:center; justify-content:center; font-size:40px; }
  .polaroid .tape { position:absolute; top:-10px; left:50%; transform:translateX(-50%) rotate(2deg); width:70px; height:22px; background:rgba(217,165,20,.45); }
  .top h1 { font-family:'Caveat',cursive; font-size:34px; font-weight:700; margin-top:10px; }
  .top .date { font-size:14px; font-weight:700; color:#8a8577; }

  .count { text-align:center; margin:6px 0 0; }
  .count .num { font-family:'Caveat',cursive; font-size:46px; color:#d64533; font-weight:700; line-height:1; transform:rotate(-1deg); display:inline-block; }
  .count .label { font-size:12.5px; font-weight:800; letter-spacing:.04em; color:#d64533; text-transform:uppercase; }

  .commit { margin:20px 22px; background:#faf6ec; border:1.5px solid #e5decf; border-radius:6px; padding:18px 18px 16px; position:relative; transform:rotate(-.4deg); }
  .commit .kicker { font-size:12.5px; font-weight:800; letter-spacing:.03em; color:#8a8577; text-transform:uppercase; }
  .commit h2 { font-size:19px; font-weight:800; margin-top:6px; line-height:1.3; }
  .commit .nota { font-family:'Caveat',cursive; font-size:19px; color:#6d675c; margin-top:6px; }
  .stamp { position:absolute; right:16px; top:-14px; background:#fffefb; font-family:'Caveat',cursive; font-size:21px; color:#5a7d3b; border:2px solid #5a7d3b; border-radius:4px; padding:2px 10px; transform:rotate(-6deg); }

  .release { text-align:center; margin:4px 0 8px; }
  .release a { font-size:13px; color:#8a8577; text-decoration:underline; text-decoration-color:#d9c7a7; }

  .divider { display:flex; align-items:center; gap:10px; margin:22px 22px 4px; }
  .divider .line { flex:1; height:1px; background:#e5decf; }
  .divider span { font-family:'Caveat',cursive; font-size:22px; color:#33302c; white-space:nowrap; }

  .sub { text-align:center; font-size:13.5px; color:#8a8577; margin:0 22px 6px; }

  .card { margin:12px 22px; background:#fff; border:1.5px solid #e5decf; border-radius:6px; padding:16px 18px; position:relative; }
  .card:nth-child(odd) { transform:rotate(.4deg); }
  .card h3 { font-size:16.5px; font-weight:800; }
  .card .nota { font-family:'Caveat',cursive; font-size:20px; color:#6d675c; margin:4px 0 8px; }
  .flex-mark { font-size:12.5px; font-weight:800; letter-spacing:.03em; }
  .exact { color:#d64533; }
  .ref { color:#5a7d3b; }
  .take { float:right; background:#33302c; color:#fffefb; border:none; font-family:'Karla'; font-weight:800; font-size:13.5px; padding:9px 16px; border-radius:4px; }

  .foot { text-align:center; font-family:'Caveat',cursive; font-size:21px; color:#8a8577; padding:14px 0 28px; }
</style>
</head>
<body>
<div class="phone">
  <div class="top">
    <div class="polaroid"><div class="tape"></div><div class="ph">📷</div></div>
    <h1>El cumple de Maya</h1>
    <div class="date">sábado 30 de agosto</div>
  </div>
  <div class="count">
    <div class="num">¡faltan 12 días!</div>
  </div>

  <div class="commit">
    <div class="stamp">¡ya estás en esto!</div>
    <div class="kicker">Tú te encargas de</div>
    <h2>Una planta para el balcón</h2>
    <p class="nota">"Cualquiera menos cactus, porfa 🌵"</p>
  </div>
  <div class="release"><a href="#">¿Ya no puedes? Suéltalo aquí</a></div>

  <div class="divider"><div class="line"></div><span>así va la minga</span><div class="line"></div></div>
  <p class="sub">5 de 7 deseos ya tienen quien se encargue 🙌</p>

  <div class="foot"><a href="#" style="color:#33302c; font-family:'Karla'; font-size:14px; font-weight:800; text-decoration:none; border-bottom:2px solid #33302c; padding-bottom:2px;">Ver la lista completa</a></div>
</div>
</body>
</html>
